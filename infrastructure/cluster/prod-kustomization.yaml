---
apiVersion: v1
kind: Namespace
metadata:
  name: prod
  labels:
    name: prod
---
apiVersion: v1
kind: Namespace
metadata:
  name: infra
  labels:
    name: infra
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: prod
  namespace: flux-system
spec:
  interval: 30s
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: https://github.com/JohanHellmark/HomeLab.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dice-roller
  namespace: prod
spec:
  interval: 30s
  targetNamespace: prod
  sourceRef:
    kind: GitRepository
    name: prod
    namespace: flux-system
  path: "./services/dice-roller/gitops"
  prune: true
  timeout: 1m
  postBuild:
    substitute:
      image: johanhellmark/dice-roller:20240407180410 # {"$imagepolicy": "prod:dice-roller"}
      apiVersion: source.toolkit.fluxcd.io/v1beta2
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: nats
  namespace: prod
spec:
  interval: 1h0m0s
  url: https://nats-io.github.io/k8s/helm/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nats
  namespace: prod
spec:
  chart:
    spec:
      chart: nats
      sourceRef:
        kind: HelmRepository
        name: nats
      version: 1.1.12
  interval: 1h0m0s
  targetNamespace: prod
  values:
    config:
      cluster:
        enabled: false
    container:
      merge:
        resources:
          requests:
            cpu: 50m
            memory: 300Mi
          limits:
            cpu: 200m
            memory: 1000Mi
